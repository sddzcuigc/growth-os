<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#5B67F1"/>
<title>成长OS｜先理解孩子，再规划成长</title>
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="discovery-v2.css?v=2.0">
</head>
<body>
<div class="app">
<header>
  <div class="row between"><div><h1 id="pageTitle">聊孩子</h1><div class="sub" id="pageSub">先理解，再判断，再培养</div></div><span class="version">V5.0 · 对话发现</span></div>
</header>

<section id="home" class="page active">
  <div class="card hero">
    <div class="row between"><span class="pill glass" id="childBadge">哥哥 · 9岁</span><span>本周任务</span></div>
    <h2 id="currentTaskTitle"></h2>
    <div id="taskProgressText" class="hero-meta"></div>
    <div class="progress glass-track"><div id="taskProgressBar" class="bar white-bar"></div></div>
  </div>
  <div class="section-title">今天最重要的一步</div>
  <div class="card">
    <span class="pill green">真实结果</span>
    <h3 id="todayStep"></h3>
    <div class="small" id="todayStandard"></div>
    <div class="row action-row"><button class="btn" onclick="go('workflow')">进入工作流</button><button class="btn ghost" onclick="openGuide()">家长怎么教</button></div>
  </div>
  <div class="section-title">这个项目怎样全面培养</div>
  <div class="card" id="homeMatrix"></div>
  <div class="section-title">本月优先成长</div>
  <div class="card" id="homeSkills"></div>
  <div class="grid2">
    <div class="card mini-card"><span class="pill orange">家长今晚</span><p class="strong">只示范最小样例</p><div class="small">不替孩子完成整体项目。</div></div>
    <div class="card mini-card"><span class="pill green">老人白天</span><p class="strong">提醒一次</p><div class="small">只守流程和安全，不讲复杂方法。</div></div>
  </div>
</section>

<section id="profile" class="page">
  <div class="card profile-head"><div class="avatar">哥</div><div><h2 id="profileName"></h2><div class="small" id="profileAge"></div></div></div>
  <div class="notice">画像不是档案展示，而是任务引擎的输入：兴趣决定外壳，困难决定工作流颗粒度，家庭资源决定可执行性。</div>
  <div class="section-title">兴趣与熟悉外壳</div><div class="card"><div id="profileInterests" class="row wrap"></div></div>
  <div class="section-title">当前成长重点</div><div id="profileFocus"></div>
  <div class="section-title">家庭资源</div><div class="card"><div id="profileResources" class="small"></div></div>
  <button id="editProfileBtn" class="btn secondary full" type="button">编辑孩子画像与资源</button>
</section>

<section id="skills" class="page">
  <div class="notice">技能升级不再靠“点一次复盘加一级”。必须有完成证据、真实用户、修改、独立程度和跨时间复现。</div>
  <div class="section-title">未来专业能力簇</div><div class="card" id="professionSkills"></div>
  <div class="section-title">技能树节点</div><div id="skillList"></div>
</section>

<section id="generator" class="page">
  <div class="card profile-signal" id="profileSignal"></div>
  <div class="field"><label>1. 选择孩子熟悉的项目外壳</label><div id="shellTags" class="row wrap"></div></div>
  <div class="field"><label>2. 本次核心补强能力（最多3项）</label><div id="skillTags" class="row wrap"></div></div>
  <div class="field"><label>3. 真实使用者</label><input id="realUser" value="妹妹和爷爷奶奶"/></div>
  <div class="field"><label>4. 家庭当前真实问题或期待</label><textarea id="realProblem">家里的科幻书比较多，希望家人可以快速找到，也希望孩子学会整理和维护。</textarea></div>
  <div class="field"><label>5. 每天可用时间</label><select id="availableTime"><option value="20">约20分钟</option><option value="35" selected>约35分钟</option><option value="60">约60分钟</option></select></div>
  <button class="btn full" onclick="generateTask()">生成因材施教任务与完整工作流</button>
  <div id="generatedTask"></div>
</section>

<section id="workflow" class="page">
  <div class="card"><span class="pill purple">真实委托</span><h2 id="wfTitle"></h2><div class="small" id="wfPurpose"></div><div id="wfMatrix"></div></div>
  <div id="steps"></div>
  <button class="btn green full" onclick="saveWorkflow()">保存今日进度</button>
</section>

<section id="review" class="page">
  <div class="notice" id="reviewGate"></div>
  <div class="card">
    <div class="field"><label>证据类型</label><select id="evidenceType"><option value="">请选择</option><option>照片/作品</option><option>视频/语音讲解</option><option>数据记录</option><option>真实用户反馈</option><option>家长观察记录</option></select></div>
    <div class="field"><label>独立程度</label><select id="independence"><option value="0">0 成人基本代办</option><option value="1">1 多次提示后完成</option><option value="2" selected>2 少量提示，主要自己完成</option><option value="3">3 独立完成并主动修正</option></select></div>
    <div class="check-grid">
      <label><input type="checkbox" id="userTest"> 有真实使用者测试</label>
      <label><input type="checkbox" id="revised"> 根据反馈至少修改一次</label>
      <label><input type="checkbox" id="taught"> 已经教给别人或带别人完成</label>
    </div>
    <div class="field"><label>今天的真实反馈</label><textarea id="fb" placeholder="谁用了？哪里不方便？发生了什么？"></textarea></div>
    <div class="field"><label>事实总结</label><textarea id="sum" placeholder="我做了什么？最难的步骤是什么？结果怎样？"></textarea></div>
    <div class="field"><label>提炼出的最小方法</label><textarea id="abs" placeholder="真正起作用的规则是什么？"></textarea></div>
    <div class="field"><label>下次直接应用</label><textarea id="apply" placeholder="下次遇到类似情况，第一步做什么？"></textarea></div>
    <div class="field"><label>举一反三：还能用于哪里</label><textarea id="transfer" placeholder="至少写两个新场景，并说明是否需要调整。"></textarea></div>
    <button class="btn full" onclick="saveReview()">提交证据并生成升级建议</button>
  </div>
  <div id="reviewResult"></div><div id="reviewHistory"></div>
</section>

<nav>
<button data-page="home" class="active" onclick="go('home')"><span>◌</span>聊孩子</button>
<button data-page="profile" onclick="go('profile')"><span>◎</span>发现</button>
<button data-page="skills" onclick="go('skills')"><span>◇</span>路线</button>
<button data-page="generator" onclick="go('generator')"><span>＋</span>项目</button>
<button data-page="workflow" onclick="go('workflow')"><span>✓</span>执行</button>
</nav>
</div>
<div id="modal" class="modal" onclick="if(event.target===this)closeModal()"><div class="sheet" id="sheet"></div></div>
<script src="app.js?v=2.2" defer></script>
<script src="kernel-v3.js?v=3.0" defer></script>
<script src="ai-v4.js?v=4.0" defer></script>
<script src="plus-action.js?v=1.1" defer></script>
<script src="discovery-v2.js?v=2.0" defer></script>
<script src="discovery-v2-fix.js?v=1.0" defer></script>
</body>
</html>
