<body>
<div class="app">
<header><div class="row between"><div><h1 id="pageTitle">成长OS</h1><div class="sub" id="pageSub">让每个真实任务都长出能力</div></div><span class="version">V2 · 证据驱动</span></div></header>
<section id="home" class="page active">
<div class="card hero"><div class="row between"><span class="pill glass" id="childBadge">哥哥 · 9岁</span><span>本周任务</span></div><h2 id="currentTaskTitle"></h2><div id="taskProgressText" class="hero-meta"></div><div class="progress glass-track"><div id="taskProgressBar" class="bar white-bar"></div></div></div>
<div class="section-title">今天最重要的一步</div><div class="card"><span class="pill green">真实结果</span><h3 id="todayStep"></h3><div class="small" id="todayStandard"></div><div class="row action-row"><button class="btn" onclick="go('workflow')">进入工作流</button><button class="btn ghost" onclick="openGuide()">家长怎么教</button></div></div>
<div class="section-title">这个项目怎样全面培养</div><div class="card" id="homeMatrix"></div>
<div class="section-title">本月优先成长</div><div class="card" id="homeSkills"></div>
<div class="grid2"><div class="card mini-card"><span class="pill orange">家长今晚</span><p class="strong">只示范最小样例</p><div class="small">不替孩子完成整体项目。</div></div><div class="card mini-card"><span class="pill green">老人白天</span><p class="strong">提醒一次</p><div class="small">只守流程和安全，不讲复杂方法。</div></div></div>
</section>
<section id="profile" class="page"><div class="card profile-head"><div class="avatar">哥</div><div><h2 id="profileName"></h2><div class="small" id="profileAge"></div></div></div><div class="notice">画像不是档案展示，而是任务引擎的输入：兴趣决定外壳，困难决定工作流颗粒度，家庭资源决定可执行性。</div><div class="section-title">兴趣与熟悉外壳</div><div class="card"><div id="profileInterests" class="row wrap"></div></div><div class="section-title">当前成长重点</div><div id="profileFocus"></div><div class="section-title">家庭资源</div><div class="card"><div id="profileResources" class="small"></div></div><button class="btn secondary full" onclick="editProfile()">编辑孩子画像与资源</button></section>
<section id="skills" class="page"><div class="notice">技能升级不再靠“点一次复盘加一级”。必须有完成证据、真实用户、修改、独立程度和跨时间复现。</div><div class="section-title">未来专业能力簇</div><div class="card" id="professionSkills"></div><div class="section-title">技能树节点</div><div id="skillList"></div></section>
<section id="generator" class="page"><div class="card profile-signal" id="profileSignal"></div><div class="field"><label>1. 选择孩子熟悉的项目外壳</label><div id="shellTags" class="row wrap"></div></div><div class="field"><label>2. 本次核心补强能力（最多3项）</label><div id="skillTags" class="row wrap"></div></div><div class="field"><label>3. 真实使用者</label><input id="realUser" value="妹妹和爷爷奶奶"/></div><div class="field"><label>4. 家庭当前真实问题或期待</label><textarea id="realProblem">家里的科幻书比较多，希望家人可以快速找到，也希望孩子学会整理和维护。</textarea></div><div class="field"><label>5. 每天可用时间</label><select id="availableTime"><option value="20">约20分钟</option><option value="35" selected>约35分钟</option><option value="60">约60分钟</option></select></div><button class="btn full" onclick="generateTask()">编译真实任务与完整工作流</button><div id="generatedTask"></div></section>
<section id="workflow" class="page"><div class="card"><span class="pill purple">真实委托</span><h2 id="wfTitle"></h2><div class="small" id="wfPurpose"></div><div id="wfMatrix"></div></div><div id="steps"></div><button class="btn green full" onclick="saveWorkflow()">保存今日进度</button></section>
<section id="review" class="page"><div class="notice" id="reviewGate"></div><div class="card"><div class="field"><label>证据类型</label><select id="evidenceType"><option value="">请选择</option><option>照片/作品</option><option>视频/语音讲解</option><option>数据记录</option><option>真实用户反馈</option><option>家长观察记录</option></select></div><div class="field"><label>独立程度</label><select id="independence"><option value="0">0 成人基本代办</option><option value="1">1 多次提示后完成</option><option value="2" selected>2 少量提示，主要自己完成</option><option value="3">3 独立完成并主动修正</option></select></div><div class="check-grid"><label><input type="checkbox" id="userTest"> 有真实使用者测试</label><label><input type="checkbox" id="revised"> 根据反馈至少修改一次</label><label><input type="checkbox" id="taught"> 已经教给别人或带别人完成</label></div><div class="field"><label>今天的真实反馈</label><textarea id="fb" placeholder="谁用了？哪里不方便？发生了什么？"></textarea></div><div class="field"><label>事实总结</label><textarea id="sum" placeholder="我做了什么？最难的步骤是什么？结果怎样？"></textarea></div><div class="field"><label>提炼出的最小方法</label><textarea id="abs" placeholder="真正起作用的规则是什么？"></textarea></div><div class="field"><label>下次直接应用</label><textarea id="apply" placeholder="下次遇到类似情况，第一步做什么？"></textarea></div><div class="field"><label>举一反三：还能用于哪里</label><textarea id="transfer" placeholder="至少写两个新场景，并说明是否需要调整。"></textarea></div><button class="btn full" onclick="saveReview()">提交证据并生成升级建议</button></div><div id="reviewResult"></div><div id="reviewHistory"></div></section>
<nav><button data-page="home" class="active" onclick="go('home')"><span>⌂</span>首页</button><button data-page="profile" onclick="go('profile')"><span>◎</span>画像</button><button data-page="skills" onclick="go('skills')"><span>◇</span>技能</button><button data-page="generator" onclick="go('generator')"><span>＋</span>任务</button><button data-page="review" onclick="go('review')"><span>✓</span>复盘</button></nav>
</div><div id="modal" class="modal" onclick="if(event.target===this)closeModal()"><div class="sheet" id="sheet"></div></div>

function renderGenerator(){getEl('profileSignal').innerHTML=`<b>系统正在读取画像</b><div class="small">兴趣：${state.child.interests.join('、')}<br>重点：${state.child.focus.map(x=>x.name).join('、')}<br>资源：${state.child.resources.slice(0,4).join('、')}……</div>`;getEl('shellTags').innerHTML=shells.map(x=>`<button class="tag ${x===chosenShell?'selected':''}" onclick="chosenShell='${x.replaceAll("'","\\'")}';renderGenerator()">${x}</button>`).join('');getEl('skillTags').innerHTML=skillOptions.map(x=>`<button class="tag skill ${chosenSkills.includes(x)?'selected':''}" onclick="toggleSkill('${x}')">${x}</button>`).join('')}function toggleSkill(x){if(chosenSkills.includes(x))chosenSkills=chosenSkills.filter(k=>k!==x);else if(chosenSkills.length<3)chosenSkills.push(x);renderGenerator()}function generateTask(){const o=buildTask(chosenShell,chosenSkills,getEl('realUser').value.trim()||'家人',getEl('realProblem').value.trim()||'完成一个真实家庭问题',getEl('availableTime').value);getEl('generatedTask').innerHTML=`<div class="card"><span class="pill green">编译完成</span><h2>${o.title}</h2><p class="small">${o.purpose}</p>${matrixHtml(o)}<p class="small"><b>真实交付：</b>${o.outputs.join('、')}<br><b>安全边界：</b>${o.safety}</p><button class="btn full" id="useTaskBtn">使用这个任务</button></div>`;getEl('useTaskBtn').onclick=()=>{state.task=o;save();renderHome();go('workflow')}}
function renderWorkflow(){const t=state.task;getEl('wfTitle').textContent=t.title;getEl('wfPurpose').textContent=t.purpose;getEl('wfMatrix').innerHTML=matrixHtml(t);getEl('steps').innerHTML=t.steps.map((s,i)=>`<div class="task-step ${s.done?'done':''}"><div class="step-dot">${s.done?'✓':i+1}</div><div class="step-body"><span class="pill gray">${s.phase}</span><h3>${s.title}</h3><p><b>本步目的：</b>${s.purpose}</p><div class="step-meta"><div class="meta-box"><b>预计时间</b><br>${s.duration}分钟</div><div class="meta-box"><b>留下证据</b><br>${s.evidence}</div></div><div class="detail-block"><p><b>孩子：</b>${s.child}</p><p><b>家长：</b>${s.parent}</p><p><b>老人：</b>${s.elder}</p><p><b>材料：</b>${s.materials.join('、')}</p><p><b>完成标准：</b>${s.standard}</p><p><b>本步能力：</b>${s.skills.join('、')}</p></div><textarea class="step-note" placeholder="记录卡点、提示次数或今天的证据……" onchange="setStepNote(${i},this.value)">${s.note||''}</textarea><label class="checkline"><input type="checkbox" ${s.done?'checked':''} onchange="toggleStep(${i},this.checked)"> 已完成、检查并收尾</label></div></div>`).join('')}function setStepNote(i,v){state.task.steps[i].note=v;save()}function toggleStep(i,v){state.task.steps[i].done=v;save();renderWorkflow();renderHome()}function saveWorkflow(){save();alert('进度、卡点和证据记录已保存。')}
function renderReviewPage(){const d=state.task.steps.filter(s=>s.done).length,n=state.task.steps.length;getEl('reviewGate').innerHTML=`当前任务完成 <b>${d}/${n}</b> 步。复盘可以随时保存，但只有“全部完成＋真实用户测试＋至少一次修改＋独立完成”为强证据。`;renderReviews();getEl('reviewResult').innerHTML=''}function reviewScore(d){let s=0,a=state.task.steps.every(x=>x.done);if(a)s+=2;if(d.evidenceType)s++;if(d.independence>=2)s++;if(d.userTest)s++;if(d.revised)s++;if(d.feedback.length>=8)s++;if(d.summary.length>=8)s++;if(d.abstract.length>=6)s++;if(d.apply.length>=6)s++;if(d.transfer.length>=8)s++;if(d.taught)s++;return{score:s,max:12,strong:a&&d.independence>=2&&d.userTest&&d.revised&&s>=9}}
function saveReview(){const d={id:nowId(),date:new Date().toISOString(),taskId:state.task.id,task:state.task.title,shell:state.task.shell,evidenceType:getEl('evidenceType').value,independence:Number(getEl('independence').value),userTest:getEl('userTest').checked,revised:getEl('revised').checked,taught:getEl('taught').checked,feedback:getEl('fb').value.trim(),summary:getEl('sum').value.trim(),abstract:getEl('abs').value.trim(),apply:getEl('apply').value.trim(),transfer:getEl('transfer').value.trim()},q=reviewScore(d);d.score=q.score;d.strong=q.strong;state.reviews.unshift(d);[...state.task.coreSkills.map(s=>[s,2]),...state.task.supportSkills.map(s=>[s,1])].forEach(([s,w])=>{if(state.skills[s])state.skills[s].evidence.push({reviewId:d.id,date:d.date.slice(0,10),taskId:d.taskId,shell:d.shell,strong:d.strong,weight:w,independence:d.independence,userTest:d.userTest,revised:d.revised,taught:d.taught,transfer:d.transfer})});save();renderSkills();renderHome();renderReviews();const e=state.task.coreSkills.filter(eligibleForUpgrade);getEl('reviewResult').innerHTML=`<div class="card"><div class="row between"><div><b>本次证据质量</b><div class="small">${d.strong?'强证据：可用于技能升级判断':'普通证据：已记录，但暂不支持升级'}</div></div><div class="review-score">${q.score}/${q.max}</div></div>${e.length?`<p class="eligible">可进入家长确认：${e.join('、')}</p>`:'<p class="small">还没有技能达到升级门槛。继续在不同日期或项目中积累证据。</p>'}</div>`;alert('复盘已保存。注意：技能不会自动升级，只增加证据。')}
function renderReviews(){const l=getEl('reviewHistory');if(!l)return;l.innerHTML=state.reviews.length?'<div class="section-title">历史证据</div>'+state.reviews.map(r=>`<div class="card"><div class="row between"><span class="pill purple">${new Date(r.date).toLocaleDateString()}</span><span class="pill ${r.strong?'green':'gray'}">${r.strong?'强证据':'普通证据'} ${r.score||0}/12</span></div><h3>${r.task}</h3><div class="cycle"><div class="cycle-num">1</div><div><b>反馈</b><div class="small">${r.feedback||'未填写'}</div></div></div><div class="cycle"><div class="cycle-num">2</div><div><b>提炼</b><div class="small">${r.abstract||'未填写'}</div></div></div><div class="cycle"><div class="cycle-num">3</div><div><b>迁移</b><div class="small">${r.transfer||'未填写'}</div></div></div></div>`).join(''):'<div class="empty">还没有证据记录。</div>'}
function openGuide(){const s=state.task.steps.find(x=>!x.done)||state.task.steps.at(-1);getEl('sheet').innerHTML=`<div class="row between"><h2>今晚10分钟教学脚本</h2><button class="btn ghost" onclick="closeModal()">关闭</button></div><hr><p><b>当前步骤：${s.title}</b></p><p class="small">${s.standard}</p><p><b>1. 先让孩子复述目的（2分钟）</b></p><p class="small">“今天这一步给谁用？做完应该看到什么？”</p><p><b>2. 只示范最小样例（3分钟）</b></p><p class="small">${s.parent}</p><p><b>3. 让孩子接手（3分钟）</b></p><p class="small">只问：“你下一步准备做什么？”不要连续纠正。</p><p><b>4. 明确证据（1分钟）</b></p><p class="small">今天要留下：${s.evidence}</p><p><b>5. 结束和收尾（1分钟）</b></p><p class="small">确认材料归位，并让孩子说出明天的最小一步。</p>`;getEl('modal').classList.add('open')}
function editProfile(){getEl('sheet').innerHTML=`<div class="row between"><h2>编辑孩子画像</h2><button class="btn ghost" onclick="closeModal()">关闭</button></div><div class="field"><label>姓名</label><input id="edName" value="${state.child.name}"></div><div class="field"><label>年龄阶段</label><input id="edAge" value="${state.child.age}"></div><div class="field"><label>兴趣（逗号分隔）</label><textarea id="edInterests">${state.child.interests.join('，')}</textarea></div><div class="field"><label>成长重点：每行“能力|描述”</label><textarea id="edFocus">${state.child.focus.map(x=>`${x.name}|${x.desc}`).join('\n')}</textarea></div><div class="field"><label>家庭资源（每行一项）</label><textarea id="edResources">${state.child.resources.join('\n')}</textarea></div><button class="btn full" onclick="saveProfile()">保存并用于下一次任务编译</button><hr><div class="grid2"><button class="btn secondary" onclick="exportData()">导出数据</button><button class="btn ghost" onclick="importData()">导入数据</button></div>`;getEl('modal').classList.add('open')}function saveProfile(){state.child.name=getEl('edName').value.trim()||'孩子A';state.child.age=getEl('edAge').value.trim();state.child.interests=getEl('edInterests').value.split(/[，,]/).map(x=>x.trim()).filter(Boolean);state.child.focus=getEl('edFocus').value.split('\n').map(x=>x.trim()).filter(Boolean).map(line=>{const[n,...r]=line.split('|');return{name:n.trim(),desc:r.join('|').trim()||'需要在真实项目中继续观察'}});state.child.resources=getEl('edResources').value.split('\n').map(x=>x.trim()).filter(Boolean);save();renderProfile();closeModal()}function exportData(){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(state,null,2)],{type:'application/json'}));a.download='成长OS数据_V2.json';a.click()}function importData(){const i=document.createElement('input');i.type='file';i.accept='.json';i.onchange=()=>{const r=new FileReader();r.onload=()=>{try{localStorage.setItem('growthOS',JSON.stringify(JSON.parse(r.result)));location.reload()}catch(e){alert('文件格式不正确')}};r.readAsText(i.files[0])};i.click()}function closeModal(){getEl('modal').classList.remove('open')}
renderHome();renderProfile();renderSkills();renderGenerator();renderWorkflow();renderReviewPage();
</script>
</body>
</html>
