<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#6657f6"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta http-equiv="Pragma" content="no-cache"/>
<meta http-equiv="Expires" content="0"/>
<title>成长OS｜孩子的成长世界</title>
<meta name="description" content="孩子自己选择真实冒险，一次推进一关，用作品、反馈和修改点亮终身能力。"/>
<link rel="stylesheet" href="styles.css?v=7.2">
<link rel="stylesheet" href="coach-v1.css?v=7.2">
<link rel="stylesheet" href="coach-pixel-v72.css?v=7.2">
<link rel="stylesheet" href="world-v8-core.css?v=8.0">
<link rel="stylesheet" href="world-v8-mission.css?v=8.0">
<link rel="stylesheet" href="world-v8-profile.css?v=8.0">
<script>
try {
  if (!localStorage.getItem('growthOSFamilyV1')) {
    const legacy = {
      state: localStorage.getItem('growthOS'),
      assessment: localStorage.getItem('growthOSDiscoveryV3'),
      savedAt: new Date().toISOString()
    };
    localStorage.setItem('growthOSLegacyBeforeFamily', JSON.stringify(legacy));
    localStorage.removeItem('growthOS');
    localStorage.removeItem('growthOSDiscoveryV3');
  }
} catch (error) {
  console.warn('无法准备双孩样例数据', error);
}
</script>
<script src="family-bootstrap.js?v=7.2"></script>
</head>
<body>
<div class="app">
<header>
  <div class="row between">
    <div><h1 id="pageTitle">成长世界</h1><div class="sub" id="pageSub">孩子自己选择，真实作品点亮能力</div></div>
    <span class="version">V8.0 · 成长世界</span>
  </div>
</header>

<section id="home" class="page active" aria-label="孩子的成长世界"></section>
<section id="profile" class="page" aria-label="作品与动态档案"></section>

<section id="skills" class="page" aria-label="能力星图">
  <div class="notice">能力升级必须有真实任务证据。系统会记录投入、独立程度、实际难度和迁移表现，而不是只靠一次测试。</div>
  <div class="section-title">未来专业能力簇</div><div class="card" id="professionSkills"></div>
  <div class="section-title">技能树节点</div><div id="skillList"></div>
</section>

<section id="generator" class="page" aria-label="冒险大厅">
  <div class="notice">系统只提供有限选择；家长手动项目编译器退出孩子主流程。</div>
  <div class="card profile-signal" id="profileSignal"></div>
  <div class="field"><label>选择孩子熟悉的项目外壳</label><div id="shellTags" class="row wrap"></div></div>
  <div class="field"><label>核心补强能力（最多3项）</label><div id="skillTags" class="row wrap"></div></div>
  <div class="field"><label>真实使用者</label><input id="realUser" value="家人"/></div>
  <div class="field"><label>当前真实问题</label><textarea id="realProblem" placeholder="例如：家里的书总是找不到；妹妹想学会拍球；周末想设计一条低成本路线。"></textarea></div>
  <div class="field"><label>每天可用时间</label><select id="availableTime"><option value="20">约20分钟</option><option value="35" selected>约35分钟</option><option value="60">约60分钟</option></select></div>
  <button class="btn full" onclick="generateTask()">生成完整工作流</button>
  <div id="generatedTask"></div>
</section>

<section id="workflow" class="page" aria-label="当前真实任务">
  <div class="card"><span class="pill purple">真实任务</span><h2 id="wfTitle"></h2><div class="small" id="wfPurpose"></div><div id="wfMatrix"></div></div>
  <div id="steps"></div>
  <button class="btn green full" onclick="saveWorkflow()">保存今日进度</button>
</section>

<section id="review" class="page" aria-label="成长作品馆">
  <div class="notice" id="reviewGate"></div>
  <div class="card">
    <div class="field"><label>证据类型</label><select id="evidenceType"><option value="">请选择</option><option>照片/作品</option><option>视频/语音讲解</option><option>数据记录</option><option>真实用户反馈</option><option>家长观察记录</option></select></div>
    <div class="field"><label>独立程度</label><select id="independence"><option value="0">0 成人基本代办</option><option value="1">1 多次提示后完成</option><option value="2" selected>2 少量提示，主要自己完成</option><option value="3">3 独立完成并主动修正</option></select></div>
    <div class="check-grid">
      <label><input type="checkbox" id="userTest"/> 有真实使用者测试</label>
      <label><input type="checkbox" id="revised"/> 根据反馈至少修改一次</label>
      <label><input type="checkbox" id="taught"/> 已经教给别人或带别人完成</label>
    </div>
    <div class="field"><label>今天的真实反馈</label><textarea id="fb" placeholder="谁用了？哪里不方便？发生了什么？"></textarea></div>
    <div class="field"><label>事实总结</label><textarea id="sum" placeholder="我做了什么？最难的步骤是什么？结果怎样？"></textarea></div>
    <div class="field"><label>提炼出的最小方法</label><textarea id="abs" placeholder="真正起作用的规则是什么？"></textarea></div>
    <div class="field"><label>下次直接应用</label><textarea id="apply" placeholder="下次遇到类似情况，第一步做什么？"></textarea></div>
    <div class="field"><label>举一反三：还能用于哪里</label><textarea id="transfer" placeholder="至少写两个新场景，并说明是否需要调整。"></textarea></div>
    <button class="btn full" onclick="saveReview()">提交证据</button>
  </div>
  <div id="reviewResult"></div><div id="reviewHistory"></div>
</section>

<nav aria-label="主要导航">
  <button data-page="home" class="active" onclick="go('home')"><span>✦</span>世界</button>
  <button data-page="profile" onclick="go('profile')"><span>☺</span>我的</button>
  <button data-page="skills" onclick="go('skills')"><span>◆</span>星图</button>
  <button data-page="generator" onclick="go('generator')"><span>▣</span>冒险</button>
  <button data-page="workflow" onclick="go('workflow')"><span>✓</span>当前</button>
</nav>
</div>
<div id="modal" class="modal" onclick="if(event.target===this)document.getElementById('modal').classList.remove('open')"><div class="sheet" id="sheet"></div></div>
<script src="app.js?v=7.2" defer></script>
<script src="kernel-v3.js?v=7.2" defer></script>
<script src="coach-v1.js?v=7.2" defer></script>
<script src="coach-workflow-v1.js?v=7.2" defer></script>
<script src="world-v8.js?v=8.0" defer></script>
</body>
</html>
