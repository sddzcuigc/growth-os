<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#f5eee2">
<title>成长OS V6｜高保真方块世界原型</title>
<link rel="stylesheet" href="v6.css?v=1.0">
</head>
<body>
<main class="v6-wrap" aria-label="成长OS高保真视觉原型">
  <div class="v6-stage" id="v6Stage">
    <img id="v6Reference" class="v6-reference" alt="成长OS方块世界首页">
    <button class="hotspot settings" data-action="settings" aria-label="设置"></button>
    <button class="hotspot brother" data-child="brother" aria-label="切换到哥哥"></button>
    <button class="hotspot sister" data-child="sister" aria-label="切换到妹妹"></button>
    <button class="hotspot microphone" data-target="home-detail" aria-label="开始AI语音观察"></button>
    <button class="hotspot task" data-target="workflow" aria-label="查看今日任务"></button>
    <button class="hotspot skills" data-target="skills" aria-label="查看技能树"></button>
    <button class="hotspot projects" data-target="generator" aria-label="查看项目工作流"></button>
    <button class="hotspot profile" data-target="profile" aria-label="查看成长档案"></button>
    <button class="hotspot nav-home" data-target="home" aria-label="了解"></button>
    <button class="hotspot nav-findings" data-target="profile" aria-label="发现"></button>
    <button class="hotspot nav-roadmap" data-target="skills" aria-label="路线"></button>
    <button class="hotspot nav-project" data-target="generator" aria-label="项目"></button>
    <button class="hotspot nav-execute" data-target="workflow" aria-label="执行"></button>
    <div class="v6-toast" id="v6Toast" role="status" aria-live="polite"></div>
  </div>
</main>
<script src="v6-ref-0.js"></script><script src="v6-ref-1.js"></script><script src="v6-ref-2.js"></script>
<script src="v6-ref-3.js"></script><script src="v6-ref-4.js"></script><script src="v6-ref-5.js"></script>
<script src="v6-ref-6.js"></script><script src="v6-ref-7.js"></script><script src="v6-ref-8.js"></script>
<script src="v6.js?v=1.0"></script>
</body>
</html>
