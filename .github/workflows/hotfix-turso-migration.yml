name: Hotfix Turso migration

on:
  push:
    branches: [main]
    paths:
      - scripts/hotfix-turso-migration.mjs
      - .github/workflows/hotfix-turso-migration.yml

permissions:
  contents: write

jobs:
  hotfix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: node scripts/hotfix-turso-migration.mjs
      - run: npm run check
      - run: npm run test:api
      - name: Publish verified hotfix
        run: |
          git config user.name "growth-os-ci"
          git config user.email "growth-os-ci@users.noreply.github.com"
          rm -f scripts/hotfix-turso-migration.mjs .github/workflows/hotfix-turso-migration.yml
          git add api/server.js scripts/hotfix-turso-migration.mjs .github/workflows/hotfix-turso-migration.yml
          if git diff --cached --quiet; then
            echo "No changes to publish"
            exit 0
          fi
          git commit -m "fix: make schema migration idempotent on Turso"
          git push origin HEAD:main
