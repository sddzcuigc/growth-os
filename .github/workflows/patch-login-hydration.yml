name: Patch Login Hydration

on:
  push:
    branches:
      - fix/profile-auth-hydration
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/profile-auth-hydration
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: node scripts/patch-login-hydration.mjs
      - name: Verify code and auth regressions
        run: |
          npm run check
          node --test tests/api/auth-security.test.mjs tests/api/account-deletion-race.test.mjs
      - name: Commit verified login hydration fix
        run: |
          git config user.name "growth-os-fix-bot"
          git config user.email "growth-os-fix-bot@users.noreply.github.com"
          git add app.js
          if git diff --cached --quiet; then
            echo "Login hydration already patched"
          else
            git commit -m "fix: render account profiles before cloud hydration"
            git push origin HEAD:fix/profile-auth-hydration
          fi
