name: Sync verified GrowthOS target

on:
  push:
    branches:
      - fix/evidence-loop-journey-kernel

permissions:
  contents: write

jobs:
  sync:
    if: "!contains(github.event.head_commit.message, '[verified-target]')"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out clean main baseline
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Download and verify exact source patch
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL --retry 5 --retry-all-errors \
            https://filebin.net/growthos-journey-4c8a17f2/growthos-main-to-target-portable.patch \
            -o /tmp/growthos.patch
          curl -fsSL --retry 5 --retry-all-errors \
            https://filebin.net/growthos-journey-4c8a17f2/growthos-main-to-target-portable.sha256 \
            -o /tmp/growthos.sha256
          sha256sum -c /tmp/growthos.sha256

      - name: Apply exact source patch
        shell: bash
        run: |
          set -euo pipefail
          patch -p1 --forward --batch < /tmp/growthos.patch

      - name: Install dependencies
        run: npm ci

      - name: Validate product structure
        run: npm run check

      - name: Run API regression suite
        run: npm run test:api

      - name: Commit verified target source
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .growthos-critical .growthos-patch .growthos-sync
          rm -f .github/workflows/apply-growthos-journey-patch.yml
          rm -f .github/workflows/sync-growthos-verified-target.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: unify GrowthOS evidence journey [verified-target]"
          git push --force origin HEAD:fix/evidence-loop-journey-kernel
