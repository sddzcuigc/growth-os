name: Apply Usability V7

on:
  push:
    branches:
      - fix/usability-model-task-v7

permissions:
  contents: write

jobs:
  apply-test-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/usability-model-task-v7
          fetch-depth: 0
          show-progress: false

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Apply readable migration
        run: |
          cat .ux-patch/part-00.py .ux-patch/part-01.py .ux-patch/part-02.py .ux-patch/part-03.py .ux-patch/part-04.py .ux-patch/part-05.py > /tmp/apply_usability_v7.py
          python /tmp/apply_usability_v7.py

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Product validation
        run: npm run check

      - name: API regression suite
        run: |
          rm -rf /tmp/growth-os-http-tests
          ENABLE_TEST_ADMIN=true GROWTH_OS_DATA_DIR=/tmp/growth-os-http-tests npm start > /tmp/growth-os-http-server.log 2>&1 &
          server_pid=$!
          for attempt in $(seq 1 30); do
            curl -fsS http://127.0.0.1:5173/api/status >/dev/null 2>&1 && break
            sleep 0.2
          done
          npm run test:api
          curl -fsS http://127.0.0.1:5173/api/models | grep -q 'models'
          kill "$server_pid" >/dev/null 2>&1 || true
          wait "$server_pid" >/dev/null 2>&1 || true

      - name: Publish verified source
        run: |
          rm -rf .ux-patch
          rm -f .github/workflows/apply-usability-v7.yml
          git config user.name "growth-os-ci"
          git config user.email "growth-os-ci@users.noreply.github.com"
          git add -A
          git commit -m "fix: simplify GrowthOS UI, AI flow and measurable tasks"
          git push origin HEAD:fix/usability-model-task-v7
