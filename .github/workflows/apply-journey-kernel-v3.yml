name: Apply Journey Kernel v3

on:
  push:
    branches:
      - fix/journey-kernel-v3
  pull_request:
    branches:
      - main

permissions:
  contents: write
  pull-requests: read

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 0
          show-progress: false

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Assemble readable migration
        run: cat .journey-patch/part-00.py .journey-patch/part-01a.py .journey-patch/part-00b.py .journey-patch/part-01b.py .journey-patch/part-02.py .journey-patch/part-03.py .journey-patch/part-04.py > /tmp/apply_journey_kernel.py

      - name: Apply Journey kernel
        id: apply
        shell: bash
        continue-on-error: true
        run: |
          set +e
          python /tmp/apply_journey_kernel.py > /tmp/journey-migration.log 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          tail -120 /tmp/journey-migration.log
          exit 0

      - name: Upload migration diagnostic
        if: steps.apply.outputs.exit_code != '0'
        uses: actions/upload-artifact@v4
        with:
          name: journey-migration-diagnostic
          path: /tmp/journey-migration.log
          if-no-files-found: error

      - name: Stop on migration failure
        if: steps.apply.outputs.exit_code != '0'
        run: exit 1

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Product validation
        id: product_check
        shell: bash
        continue-on-error: true
        run: |
          set +e
          npm run check > /tmp/journey-product-check.log 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          tail -160 /tmp/journey-product-check.log
          exit 0

      - name: Upload product validation diagnostic
        if: steps.product_check.outputs.exit_code != '0'
        uses: actions/upload-artifact@v4
        with:
          name: journey-product-check-diagnostic
          path: /tmp/journey-product-check.log
          if-no-files-found: error

      - name: Stop on product validation failure
        if: steps.product_check.outputs.exit_code != '0'
        run: exit 1

      - name: API regression suite
        id: api_tests
        shell: bash
        continue-on-error: true
        run: |
          set +e
          timeout 180s npm run test:api > /tmp/journey-api-tests.log 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          tail -240 /tmp/journey-api-tests.log
          exit 0

      - name: Upload API regression diagnostic
        if: steps.api_tests.outputs.exit_code != '0'
        uses: actions/upload-artifact@v4
        with:
          name: journey-api-tests-diagnostic
          path: /tmp/journey-api-tests.log
          if-no-files-found: error

      - name: Stop on API regression failure
        if: steps.api_tests.outputs.exit_code != '0'
        run: exit 1

      - name: Verify deployment markers
        run: |
          grep -q 'GROWTHOS_JOURNEY_KERNEL_V2' api/server.js
          grep -q 'url.pathname === "/api/journey"' api/server.js
          grep -q 'schemaVersion: 13' api/server.js
          grep -q 'state.journey?.goal' app.js
          ! grep -q 'demo-login-hint' index.html

      - name: Commit verified source
        run: |
          rm -rf .journey-patch
          rm -f .github/workflows/apply-journey-kernel-v3.yml
          git config user.name "growth-os-ci"
          git config user.email "growth-os-ci@users.noreply.github.com"
          git add -A
          git commit -m "fix: connect GrowthOS journey evidence loop"
          git push origin HEAD:fix/journey-kernel-v3
