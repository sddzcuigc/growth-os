name: Inspect Current Fixes

on:
  push:
    branches:
      - fix/profile-auth-hydration
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Collect focused code snippets
        run: node scripts/inspect-current-fixes.mjs
      - name: Upload focused code snippets
        uses: actions/upload-artifact@v4
        with:
          name: current-fix-inspection
          path: inspection-snippets.txt
          retention-days: 2
