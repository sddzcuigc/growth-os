name: Apply GrowthOS journey patch

on:
  push:
    branches:
      - fix/evidence-loop-journey-kernel
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: fix/evidence-loop-journey-kernel

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Apply readable patch
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -d .growthos-patch ]; then
            echo "Journey patch is already applied"
            exit 0
          fi
          cat .growthos-patch/part-* > /tmp/growthos.patch
          patch -p1 --forward --batch < /tmp/growthos.patch
          rm -rf .growthos-patch .growthos-critical .growthos-sync

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Validate product
        run: npm run check

      - name: Run API regression
        run: npm run test:api

      - name: Commit verified source
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/apply-growthos-journey-patch.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "fix: unify GrowthOS evidence journey [journey-patch]"
          git push origin HEAD:fix/evidence-loop-journey-kernel
