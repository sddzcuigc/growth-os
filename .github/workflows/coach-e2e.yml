name: Coach E2E

on:
  workflow_dispatch:
  push:
    paths:
      - "index.html"
      - "coach-v1.js"
      - "coach-v1.css"
      - "coach-workflow-v1.js"
      - "tests/coach-e2e.mjs"
      - ".github/workflows/coach-e2e.yml"

permissions:
  contents: write

jobs:
  coach-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright@1.53.2
          npx playwright install --with-deps chromium

      - name: Run production recommendation loop
        id: e2e
        continue-on-error: true
        env:
          GROWTH_OS_URL: https://growth-os-ten-pearl.vercel.app/
        run: node tests/coach-e2e.mjs

      - name: Upload screenshots and report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: growth-os-coach-e2e
          path: artifacts/coach-e2e
          if-no-files-found: error
          retention-days: 14

      - name: Publish latest QA report
        if: always()
        run: |
          mkdir -p qa
          cp artifacts/coach-e2e/report.json qa/coach-latest.json
          git config user.name "growth-os-qa-bot"
          git config user.email "actions@users.noreply.github.com"
          git add qa/coach-latest.json
          if ! git diff --cached --quiet; then
            git commit -m "Update coach QA report [skip ci]"
            git push
          fi

      - name: Fail when E2E failed
        if: steps.e2e.outcome == 'failure'
        run: exit 1

